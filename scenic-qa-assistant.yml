                        "code": "import re\n\n\ndef normalize_text(text):\n\n    text = text.strip().lower()\n\n    text = re.sub(\n        r\"[锛屻€傦紒锛熴€?.!?~锝烇紱;锛?\\s]+\",\n        \"\",\n        text\n    )\n\n    return text\n\n\ndef exact_match(query, keywords):\n\n    q = normalize_text(query)\n\n    for k in keywords:\n\n        if q == normalize_text(k):\n\n            return True\n\n    return False\n\n\ndef contain_match(query, keywords):\n\n    q = normalize_text(query)\n\n    for k in keywords:\n\n        if normalize_text(k) in q:\n\n            return True\n\n    return False\n\n\ndef main(query):\n\n    query = query.strip()\n\n    greeting_words = [\n        \"浣犲ソ\", \"鎮ㄥソ\", \"hi\", \"hello\",\n        \"鍦ㄥ悧\", \"鏈変汉鍚梊", \"璇烽棶\",\n        \"鍝堝柦\", \"鍡╘", \"鏃╀笂濂絓",\n        \"涓嬪崍濂絓", \"鏅氫笂濂絓"\n    ]\n\n    thanks_words = [\n        \"璋㈣阿\", \"鎰熻阿\", \"澶氳阿\",\n        \"璋㈣阿浣燶", \"杈涜嫤浜哱"\n    ]\n\n    goodbye_words = [\n        \"鍐嶈\", \"鎷滄嫓\", \"bye\",\n        \"缁撴潫\", \"涓嶇敤浜哱",\n        \"娌′簨浜哱", \"88\"\n    ]\n\n    service_words = [\n        \"浜哄伐\",\n        \"瀹㈡湇\",\n        \"浜哄伐瀹㈡湇\",\n        \"杞汉宸",\n        \"浜哄伐鏈嶅姟\",\n        \"宸ヤ綔浜哄憳\"\n    ]\n\n    # 浜哄伐\n    if contain_match(query, service_words):\n\n        return {\n            \"type\": \"human_service\",\n            \"response\": \"鎮ㄥソ锛岃鐐瑰嚮www.lqm.com杩涜浜哄伐鍜ㄨ銆俓",\n            \"need_rag\": False,\n            \"original_query\": query\n        }\n\n    # 闂€橽n    if exact_match(query, greeting_words) or contain_match(\n        query,\n        greeting_words\n    ):\n\n        return {\n            \"type\": \"greeting\",\n            \"response\":\n            \"鎮ㄥソ锛屾杩庝娇鐢ㄦ櫙鍖哄皬鍔╂墜馃槉 \"\n            \"鎴戝彲浠ヤ负鎮ㄦ彁渚涙櫙鐐逛粙缁嶃€佸紑鏀炬椂闂淬€侀棬绁ㄤ俊鎭€佹父瑙堣矾绾跨瓑鏈嶅姟銆俓",\n            \"need_rag\": False,\n            \"original_query\": query\n        }\n\n    # 鎰熻阿\n    if exact_match(query, thanks_words) or contain_match(\n        query,\n        thanks_words\n    ):\n\n        return {\n            \"type\": \"thanks\",\n            \"response\":\n            \"涓嶅姘旔煒?寰堥珮鍏翠负鎮ㄦ湇鍔°€俓",\n            \"need_rag\": False,\n            \"original_query\": query\n        }\n\n    # 缁撴潫\n    if exact_match(query, goodbye_words) or contain_match(\n        query,\n        goodbye_words\n    ):\n\n        return {\n            \"type\": \"goodbye\",\n            \"response\":\n            \"鎰熻阿鎮ㄧ殑鍜ㄨ锛岀鎮ㄦ父瑙堟剦蹇煂竆",\n            \"need_rag\": False,\n            \"original_query\": query\n        }\n\n    # 榛樿璧癛AG\n    return {\n        \"type\": \"rag\",\n        \"response\": \"\",\n        \"need_rag\": True,\n        \"original_query\": query\n    }",
