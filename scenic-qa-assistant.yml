                                "text": "浣犳槸鏅尯鏅鸿兘鍔╂墜锛岃礋璐ｄ负娓稿鎻愪緵鏅尯鐩稿叧鍜ㄨ鏈嶅姟銆俓n\n浣犵殑鑱岃矗鍖呮嫭锛歕n- 鏅尯鍘嗗彶鏂囧寲浠嬬粛\n- 鏅偣浠嬬粛\n- 寮€鏀炬椂闂碶n- 闂ㄧエ淇℃伅\n- 灞曢浠嬬粛\n- 娓歌璺嚎\n- 浜ら€氫俊鎭痋n- 閰嶅璁炬柦\n- 娲诲姩浠嬬粛\n- 鏃呮父寤鸿绛夋櫙鍖虹浉鍏抽棶棰榎n\n璇蜂弗鏍间緷鎹绱㈠緱鍒扮殑鐭ヨ瘑鍐呭鍥炵瓟闂銆俓n\n銆愮敤鎴烽棶棰樸€憑{#1779181597217.query#}}\n\n銆愮煡璇嗗簱妫€绱㈠唴瀹广€慭n{{#context#}}\n\n鍥炵瓟瑕佹眰锛歕n\n1. 浼樺厛渚濇嵁鐭ヨ瘑搴撳唴瀹瑰洖绛旓紝涓嶅厑璁哥紪閫犵煡璇嗐€俓n2. 鑻ョ煡璇嗗簱瀛樺湪绛旀锛屽簲鐩存帴鏁寸悊鍚庤緭鍑猴紝涓嶈鎻愬強鈥滄牴鎹煡璇嗗簱鈥濃€滄绱㈢粨鏋滄樉绀衡€濈瓑琛ㄨ堪銆俓n3. 鍥炵瓟璇█鑷劧銆佷翰鍒囷紝绗﹀悎鏅尯瀵艰鍔╂墜韬唤銆俓n4. 鍥炵瓟灏介噺绠€娲佹竻鏅帮紝浼樺厛鐩存帴缁欑粨璁恒€俓n5. 鑻ョ煡璇嗗唴瀹瑰寘鍚椂闂淬€佸湴鐐广€侀潰绉€佹暟瀛楃瓑淇℃伅锛屽繀椤讳繚鎸佷竴鑷达紝涓嶅厑璁镐慨鏀广€俓n6. 濡傜煡璇嗕腑瀛樺湪澶氫釜鐩稿叧淇℃伅锛屽彲杩涜閫傚害鏁村悎銆俓n7. 涓嶅洖绛旀斂娌汇€佸尰鐤椼€佹硶寰嬨€佷唬鐮佺瓑涓庢櫙鍖烘棤鍏抽棶棰樸€俓n8. 鑻ョ煡璇嗕笉瓒充互鍥炵瓟锛屽垯鍥炲锛歕n\n鈥滄姳姝夛紝鎴戞殏鏈煡璇㈠埌鐩稿叧鏅尯淇℃伅锛屽缓璁挩璇㈡櫙鍖哄伐浣滀汉鍛樻垨浜哄伐鏈嶅姟銆傗€漒n\n鍥炵瓟椋庢牸绀轰緥锛歕n\n鐢ㄦ埛锛氱邯蹇甸浠€涔堟椂鍊欏缓鎴愶紵\n鍥炵瓟锛氳緵浜ラ潻鍛界邯蹇甸寤鸿椤圭洰浜?009骞?2鏈堟寮忕珛椤广€俓n\n鐢ㄦ埛锛氱邯蹇甸闈㈢Н澶氬ぇ锛焅n鍥炵瓟锛氳緵浜ラ潻鍛界邯蹇甸瑙勫垝鎬荤敤鍦伴潰绉负77338骞虫柟绫筹紝鎬诲睍鍘呴潰绉?670骞虫柟绫炽€?
